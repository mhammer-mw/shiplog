name: Deploy to GitHub Pages

# Publishes a static export of the app to GitHub Pages, giving us a live URL
# with zero third-party accounts. This is the interim production host for the
# MVP foundation milestone; see docs/adr/0001-stack.md for the migration path
# to Vercel once server-backed features land.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        # base_path from configure-pages is e.g. "/shiplog" for project pages.
        # NODE_ENV is set here (not job-wide) so pnpm still installs devDeps.
        run: pnpm build:static
        env:
          NODE_ENV: production
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
